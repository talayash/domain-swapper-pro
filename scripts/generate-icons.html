<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
  <style>
    body { font-family: system-ui; padding: 40px; background: #1a1a2e; color: #fff; }
    .icon-row { display: flex; gap: 20px; align-items: center; margin: 20px 0; }
    canvas { border: 1px solid #333; border-radius: 8px; }
    button { padding: 12px 24px; background: #6366f1; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
    button:hover { background: #4f46e5; }
    a { color: #a5b4fc; }
    h1 { color: #6366f1; }
  </style>
</head>
<body>
  <h1>Domain Swapper Pro - Icon Generator</h1>
  <p>Click each button to download the icon, then save them to <code>public/icons/</code></p>

  <div class="icon-row">
    <canvas id="icon16" width="16" height="16"></canvas>
    <button onclick="download(16)">Download icon-16.png</button>
  </div>

  <div class="icon-row">
    <canvas id="icon48" width="48" height="48"></canvas>
    <button onclick="download(48)">Download icon-48.png</button>
  </div>

  <div class="icon-row">
    <canvas id="icon128" width="128" height="128"></canvas>
    <button onclick="download(128)">Download icon-128.png</button>
  </div>

  <script>
    const svgContent = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6366f1"/>
          <stop offset="100%" style="stop-color:#8b5cf6"/>
        </linearGradient>
      </defs>
      <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#bg)"/>
      <g fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 32 44 L 80 44"/>
        <path d="M 68 32 L 80 44 L 68 56"/>
        <path d="M 96 84 L 48 84"/>
        <path d="M 60 72 L 48 84 L 60 96"/>
      </g>
      <circle cx="28" cy="84" r="6" fill="#ffffff" opacity="0.9"/>
      <circle cx="100" cy="44" r="6" fill="#ffffff" opacity="0.9"/>
    </svg>`;

    const sizes = [16, 48, 128];

    sizes.forEach(size => {
      const canvas = document.getElementById(`icon${size}`);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([svgContent], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);

      img.onload = () => {
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    });

    function download(size) {
      const canvas = document.getElementById(`icon${size}`);
      const link = document.createElement('a');
      link.download = `icon-${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
